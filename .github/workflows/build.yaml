name: build_windows_x86_64
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  bundle_windows_x86_64:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          clean: false
      - name: set_release_channel
        run: |
          $version = git rev-parse --short HEAD
          Write-Host "Publishing version: $version on release channel nightly"
          "nightly" | Set-Content -Path "crates/zed/RELEASE_CHANNEL"
        shell: pwsh

      - name: Use long path
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
      - name: fix_vs_devshell_path
        run: |
          $content = Get-Content script/bundle-windows.ps1 -Raw
          $oldPath = 'C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\Launch-VsDevShell.ps1'
          $newPath = 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1'
          $content = $content.Replace($oldPath, $newPath)
          Set-Content script/bundle-windows.ps1 -Value $content
        shell: pwsh
      - name: bundle
        run: script/bundle-windows.ps1 -Architecture x86_64
        shell: pwsh
        env:
          CI: ""

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: Zed-x86_64.exe
          path: target/Zed-x86_64.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: zed-remote-server-windows-x86_64.zip
          path: target/zed-remote-server-windows-x86_64.zip
          if-no-files-found: error
    timeout-minutes: 90
